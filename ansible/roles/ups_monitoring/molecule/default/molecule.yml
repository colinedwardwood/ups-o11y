---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ups-monitor-ubuntu2404
    image: geerlingguy/docker-ubuntu2404-ansible
    pre_build_image: true
    # Systemd support requires privileged mode in the test container.
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /lib/systemd/systemd

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
  inventory:
    host_vars:
      ups-monitor-ubuntu2404:
        nut_password: "molecule-test-password-123"
        # Skip Alloy in CI — Alloy isn't installed in the test image.
        # The alloy task gracefully skips when alloy_config_dir doesn't exist.
        alloy_config_dir: /tmp/alloy-test

verifier:
  name: ansible

lint: |
  set -e
  yamllint .
  ansible-lint
